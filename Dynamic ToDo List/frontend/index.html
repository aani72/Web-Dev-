<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Taskyy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header>
<h1>Taskyy</h1>
<p class="subtitle">Organize your day efficiently</p>
</header>

<div class="input-card">

<input id="title" type="text" placeholder="Enter task title" maxlength="50">

<textarea id="description" placeholder="Optional description"></textarea>

<div class="row">
<select id="priority">
<option value="Low">Low Priority</option>
<option value="Medium" selected>Medium Priority</option>
<option value="High">High Priority</option>
</select>

<button id="addBtn">Add Task</button>
</div>

</div>

<div class="toolbar">

<div class="filters">
<button data-filter="all" class="active">All</button>
<button data-filter="active">Active</button>
<button data-filter="completed">Completed</button>
</div>

<div class="counter">
<span id="count"></span>
</div>

</div>

<ul id="taskList"></ul>

<footer>
<p>Taskyy Productivity App</p>
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
