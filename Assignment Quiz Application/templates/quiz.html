<!-- quiz.html | Quiz App - Question Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Question {{ number }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{ (number / total) * 100 }}%"></div>
            </div>
            <p class="question-count">Question {{ number }} of {{ total }}</p>
            <h2 class="question-text">{{ question.question }}</h2>

            <form method="POST" action="/quiz">
                <div class="options">
                    {% for option in question.options %}
                    <label class="option-label">
                        <input type="radio" name="option" value="{{ option }}" required>
                        <span>{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
                <button type="submit" class="btn-next">
                    {% if number == total %}Submit Quiz{% else %}Next →{% endif %}
                </button>
            </form>
        </div>
    </div>
</body>
</html>
