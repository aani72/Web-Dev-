<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Flask To-Do App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-brand">📝 Flask To-Do</span>
            <span class="nav-badge" id="nav-counter">0 tasks</span>
        </div>
    </nav>

    <!-- Main Content Block -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <!-- JavaScript (defer ensures DOM is ready) -->
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
